<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<style>
body { width: 320px; padding: 15px; font-family: sans-serif; line-height: 1.4; background: #f9f9f9; }
.row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.hint { font-size: 0.8em; color: #666; display: block; }

label { font-weight: bold; }
textarea { 
	width: 100%; height: 80px; margin-top: 10px; padding: 5px;
	border: 1px solid #ccc; border-radius: 4px; resize: vertical;
	font-family: monospace; font-size: 0.9em; box-sizing: border-box;
}

		  .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
		  button { width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }

		  #blacklist_btn { background: #3498db; color: white; }
		  #blacklist_btn:hover { background: #2980b9; }

		  #save_blacklist { background: #2ecc71; color: white; }
		  #save_blacklist:hover { background: #27ae60; }

		  .status { margin-top: 10px; font-size: 0.8em; text-align: center; height: 1.2em; }
		</style>
	</head>
	<body>
		<div class="row">
			<div>
				<label for="eth_toggle">Enable Eth (Ð/ð)?</label>
				<span class="hint">Uses Þ/þ for 'dh' if off</span>
			</div>
			<input type="checkbox" id="eth_toggle">
		</div>

		<label>Blacklisted Domains:</label>
		<textarea id="blacklist_input" placeholder="one-domain-per-line.com"></textarea>

		<div class="btn-group">
			<button id="save_blacklist">Save Blacklist</button>
			<button id="blacklist_btn">Disable for Þis Site</button>
		</div>

		<div id="status_msg" class="status"></div>

		<script src="popup.js"></script>
	</body>
</html>
